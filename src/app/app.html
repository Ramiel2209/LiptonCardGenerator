<div class="container">
  <!-- 左側控制面板 -->
  <div class="control-panel">
    <h2>🚀 圖卡快速生成工具</h2>

    <div class="panel-section">
      <h3>1. 模式與版面設定</h3>
      <div class="radio-group">
        <label>
          <input type="radio" [(ngModel)]="mode" value="cover" (change)="onModeChange()" />
          首圖模式
        </label>
        <label>
          <input type="radio" [(ngModel)]="mode" value="watermark" (change)="onModeChange()" />
          水印模式
        </label>
      </div>

      <div class="radio-group">
        <label>
          <input
            type="radio"
            [(ngModel)]="orientation"
            value="portrait"
            (change)="onOrientationChange()"
          />
          垂直 (4:6)
        </label>
        <label>
          <input
            type="radio"
            [(ngModel)]="orientation"
            value="landscape"
            (change)="onOrientationChange()"
          />
          水平 (6:4)
        </label>
      </div>

      <div class="slider-container">
        <label>浮水印不透明度：{{ wmOpacity }}%</label>
        <input type="range" min="0" max="100" [(ngModel)]="wmOpacity" />
      </div>
    </div>

    <div class="panel-section">
      <h3>2. 選擇原圖</h3>
      <input type="file" id="image-input" (change)="loadUserImage($event)" accept="image/*" />
      <div class="slider-container" style="margin-top: 12px">
        <label>照片放大 / 縮小：{{ zoomValue }}%</label>
        <input
          type="range"
          min="50"
          max="300"
          [(ngModel)]="zoomValue"
          (input)="handleZoom()"
          [disabled]="!isImageLoaded"
        />
      </div>
      <small style="color: #666"
        >💡 溫馨提示：在右側預覽圖上按住滑鼠或用手指拖曳，即可自由調整照片位置！</small
      >
    </div>

    <div class="panel-section" *ngIf="mode === 'cover'">
      <h3>3. 輸入資訊</h3>

      <label>大標題：</label>
      <input type="text" [(ngModel)]="mainTitle" placeholder="請輸入大標題" />

      <label>小標題 ：</label>
      <input type="text" [(ngModel)]="subTitle" placeholder="請輸入小標題" />

      <label>客製標籤（限制 2~5 字）：</label>
      <input type="text" [(ngModel)]="tagText" placeholder="請輸入客製標籤" maxlength="5" />
    </div>

    <button class="btn-submit" (click)="downloadCardImage()">🚀 生成並下載圖片</button>
  </div>
  <!-- 右側高清實時預覽 -->
  <div class="preview-panel">
    <h2>■ 高清實時預覽</h2>

    <div
      #cardCaptureArea
      class="preview-container"
      [ngClass]="orientation"
      [style.width.px]="containerWidthPx"
      [style.height.px]="containerHeightPx"
      style="position: relative; overflow: hidden"
      (mousedown)="onMouseDown($event)"
      (touchstart)="onTouchStart($event)"
    >
      <!-- 圖層 1：使用者圖片 -->
      <img
        *ngIf="userImageSrc"
        [src]="userImageSrc"
        class="user-uploaded-image"
        style="position: absolute; max-width: none"
        [style.left.px]="imgLeft"
        [style.top.px]="imgTop"
        [style.width.px]="imgWidth"
        [style.height.px]="imgHeight"
      />

      <!-- 圖層 2：浮水印（首圖模式為斜線template，水印模式為專用浮水印） -->
      <img
        [src]="wmTemplateSrc"
        class="overlay-template image-wm-layer"
        [style.opacity]="wmOpacity / 100"
      />

      <!-- 圖層 3：底部黑色漸層遮罩（僅首圖模式，固定 100% 不透明） -->
      <img
        *ngIf="mode === 'cover'"
        [src]="'template-' + orientation + '-nowm.png'"
        class="overlay-template image-mask-layer"
      />

      <!-- 圖層 4：客製化動態標籤（僅首圖模式） -->
      <div *ngIf="mode === 'cover' && tagText && tagText.length >= 2" class="single-tag-pill">
        {{ tagText }}
      </div>

      <!-- 圖層 5：主副標題文字群組（僅首圖模式） -->
      <div class="text-info-group" *ngIf="mode === 'cover'">
        <div class="view-subtitle" style="font-weight: 00">{{ subTitle }}</div>
        <div class="view-main-title">{{ mainTitle }}</div>
      </div>
    </div>
  </div>
</div>
